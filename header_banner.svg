<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090c15" />
      <stop offset="50%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#090c15" />
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.25" />
      <stop offset="50%" stop-color="#f472b6" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.25" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="14" fill="url(#bgGrad)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" />

  <!-- Animated Wave Paths -->
  <path fill="url(#waveGrad)" d="M0,130 C150,170 350,90 500,140 C650,190 750,120 800,140 L800,200 L0,200 Z" />
  <path fill="rgba(255,255,255,0.03)" d="M0,100 C200,160 400,80 600,130 C700,150 770,110 800,120 L800,200 L0,200 Z" />

  <!-- Stars / Dots -->
  <circle cx="80" cy="40" r="1.5" fill="#ffffff" opacity="0.6" />
  <circle cx="220" cy="70" r="2" fill="#ffffff" opacity="0.8" />
  <circle cx="380" cy="30" r="1" fill="#ffffff" opacity="0.5" />
  <circle cx="590" cy="60" r="2.5" fill="#c084fc" opacity="0.7" />
  <circle cx="720" cy="35" r="1.5" fill="#ffffff" opacity="0.9" />

  <!-- Header Main Text -->
  <text x="50%" y="45%" text-anchor="middle" font-family="'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="34" font-weight="800" fill="#ffffff" letter-spacing="1">
    Welcome to Kiev's Github &lt;/&gt;
  </text>
  <text x="50%" y="68%" text-anchor="middle" font-family="'Outfit', -apple-system, sans-serif" font-size="15" font-weight="500" fill="rgba(255,255,255,0.65)" letter-spacing="2">
    WEB DEVELOPER • UI/UX &amp; BACKEND
  </text>
</svg>
