<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="200">
  <defs>
    <!-- Dark aesthetic gradient con animación fluida -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050508">
        <animate attributeName="stop-color" values="#050508;#0c0a15;#050508" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#0d0e15">
        <animate attributeName="stop-color" values="#0d0e15;#141125;#0d0e15" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#050508">
        <animate attributeName="stop-color" values="#050508;#0c0a15;#050508" dur="8s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <!-- Animated Wave Gradient -->
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.12" />
      <stop offset="50%" stop-color="#ec4899" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.12" />
    </linearGradient>

    <!-- Soft glow for main text -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    @keyframes pulseText {
      0%, 100% { opacity: 0.9; text-shadow: 0 0 8px rgba(255,255,255,0.4); }
      50% { opacity: 1; text-shadow: 0 0 20px rgba(168, 85, 247, 0.8), 0 0 30px rgba(236, 72, 153, 0.6); }
    }
    @keyframes floatStar {
      0%, 100% { transform: translateY(0px) scale(1); opacity: 0.3; }
      50% { transform: translateY(-6px) scale(1.4); opacity: 0.9; }
    }
    @keyframes waveMove {
      0% { transform: translateX(0px); }
      50% { transform: translateX(-30px); }
      100% { transform: translateX(0px); }
    }
    .main-title {
      animation: pulseText 4s ease-in-out indefinite;
    }
    .star-1 { animation: floatStar 3s ease-in-out infinite; }
    .star-2 { animation: floatStar 4.5s ease-in-out infinite 0.8s; }
    .star-3 { animation: floatStar 3.5s ease-in-out infinite 1.5s; }
    .star-4 { animation: floatStar 5s ease-in-out infinite 0.3s; }
    .star-5 { animation: floatStar 4s ease-in-out infinite 2s; }
    .wave-path { animation: waveMove 10s ease-in-out infinite; }
  </style>

  <!-- Background -->
  <rect width="800" height="200" rx="14" fill="url(#bgGrad)" stroke="rgba(255,255,255,0.04)" stroke-width="1.5" />

  <!-- Animated Wave Background -->
  <g class="wave-path">
    <path fill="url(#waveGrad)" d="M-50,130 C150,170 350,90 500,140 C650,190 850,120 900,140 L900,200 L-50,200 Z" />
  </g>

  <!-- Side Borders -->
  <line x1="40" y1="20" x2="40" y2="180" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
  <line x1="760" y1="20" x2="760" y2="180" stroke="rgba(255,255,255,0.05)" stroke-width="1" />

  <!-- Animated Twinkling / Floating Stars -->
  <circle class="star-1" cx="80" cy="50" r="1.5" fill="#ffffff" />
  <circle class="star-2" cx="160" cy="140" r="2" fill="#c084fc" />
  <circle class="star-3" cx="270" cy="40" r="1.5" fill="#ffffff" />
  <circle class="star-4" cx="530" cy="160" r="2" fill="#f472b6" />
  <circle class="star-5" cx="670" cy="60" r="1.5" fill="#ffffff" />
  <circle class="star-2" cx="730" cy="130" r="2" fill="#38bdf8" />

  <!-- Header Main Text -->
  <text class="main-title" x="50%" y="54%" text-anchor="middle" font-family="'Outfit', 'Plus Jakarta Sans', -apple-system, sans-serif" font-size="34" font-weight="800" fill="#ffffff" letter-spacing="4" filter="url(#glow)">
    Welcome to Kiev's Github &lt;/&gt;
  </text>
</svg>
