<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="200">
  <defs>
    <!-- Dark aesthetic gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050505" />
      <stop offset="50%" stop-color="#0c0d12" />
      <stop offset="100%" stop-color="#050505" />
    </linearGradient>
    <!-- Soft glow for main text -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="14" fill="url(#bgGrad)" stroke="rgba(255,255,255,0.03)" stroke-width="1.5" />

  <!-- Subtle abstract elements for dark/manga aesthetic -->
  <!-- Vertical borders -->
  <line x1="40" y1="20" x2="40" y2="180" stroke="rgba(255,255,255,0.04)" stroke-width="1" />
  <line x1="760" y1="20" x2="760" y2="180" stroke="rgba(255,255,255,0.04)" stroke-width="1" />

  <!-- Starry / Noise dots (Dark Aesthetic) -->
  <circle cx="80" cy="50" r="1" fill="#ffffff" opacity="0.3" />
  <circle cx="150" cy="140" r="1.5" fill="#ffffff" opacity="0.2" />
  <circle cx="270" cy="40" r="1" fill="#ffffff" opacity="0.4" />
  <circle cx="530" cy="160" r="1" fill="#ffffff" opacity="0.25" />
  <circle cx="670" cy="60" r="1.5" fill="#ffffff" opacity="0.35" />
  <circle cx="730" cy="130" r="1" fill="#ffffff" opacity="0.4" />

  <!-- Header Main Text with aesthetic letter spacing and font -->
  <text x="50%" y="54%" text-anchor="middle" font-family="'Outfit', 'Plus Jakarta Sans', -apple-system, sans-serif" font-size="34" font-weight="800" fill="#ffffff" letter-spacing="4" filter="url(#glow)">
    Welcome to Kiev's Github &lt;/&gt;
  </text>
</svg>
